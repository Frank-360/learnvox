<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnVox Results</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            padding:30px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        h1{
            color:#2563eb;
            margin-bottom:20px;
        }

        .summary-box{
            background:#f8fbff;
            border-left:5px solid #2563eb;
            padding:20px;
            border-radius:10px;
            margin-bottom:30px;
            line-height:1.8;
        }

        .audio-box{
            margin-top:20px;
        }

        audio{
            width:100%;
        }

        .back-btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 20px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

        .back-btn:hover{
            background:#1d4ed8;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>📚 LearnVox Summary</h1>

    <div class="summary-box">
        {{ summary | safe }}
    </div>

    <div class="audio-box">

        <h2>🎧 Audio Lesson</h2>

        <br>

        <audio controls>
            <source src="/static/audio/summary.mp3" type="audio/mpeg">
        </audio>

    </div>

    <a href="/" class="back-btn">
        Upload Another Document
    </a>

</div>

</body>
</html>
